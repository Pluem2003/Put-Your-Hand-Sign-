<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectator - Hand Pose Game</title>
    <link rel="stylesheet" href="styles.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="page spectator-page">
        <div class="header-bar">
            <a href="/" class="back-button">← Home</a>
            <h1>Spectator View</h1>
        </div>

        <div class="spectator-content">
            <div class="game-status">
                <div class="status-box">
                    <h2>Game Mode</h2>
                    <div id="gameModeText" style="font-weight: bold; font-size: 18px; color: #764ba2; text-transform: uppercase;">-</div>
                </div>
                <div class="status-box">
                    <h2>Current Task</h2>
                    <div id="currentTaskName" class="task-display">Waiting for game...</div>
                    <div id="currentTaskDesc" class="task-description"></div>
                </div>
                <div class="status-box">
                    <h2>Timer</h2>
                    <div id="gameTimer" class="timer-display">0:00</div>
                </div>
            </div>

            <div class="players-comparison">
                <div class="player-view player1-view">
                    <h2>Player 1</h2>
                    <div class="status-indicator">
                        <div id="player1Ready" class="ready-badge">Not Ready</div>
                    </div>
                    <img id="player1Camera" class="camera-feed" alt="Player 1 Camera Feed" />
                    <div class="info-box">
                        <div class="info-row">
                            <label>Score:</label>
                            <span id="player1Score">0</span>
                        </div>
                        <div class="info-row">
                            <label>Current Prediction:</label>
                            <span id="player1Prediction" class="prediction-text">-</span>
                        </div>
                        <div class="info-row">
                            <label>Confidence:</label>
                            <span id="player1Confidence">-</span>
                        </div>
                    </div>
                </div>

                <div class="vs-divider">VS</div>

                <div class="player-view player2-view">
                    <h2>Player 2</h2>
                    <div class="status-indicator">
                        <div id="player2Ready" class="ready-badge">Not Ready</div>
                    </div>
                    <img id="player2Camera" class="camera-feed" alt="Player 2 Camera Feed" />
                    <div class="info-box">
                        <div class="info-row">
                            <label>Score:</label>
                            <span id="player2Score">0</span>
                        </div>
                        <div class="info-row">
                            <label>Current Prediction:</label>
                            <span id="player2Prediction" class="prediction-text">-</span>
                        </div>
                        <div class="info-row">
                            <label>Confidence:</label>
                            <span id="player2Confidence">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="winnerAnnouncement" class="winner-announcement" style="display: none;">
                <h2 id="winnerText"></h2>
                <p>Click to start next round...</p>
            </div>

            <div class="game-status-footer">
                <p id="gameStatusText">Waiting for players to be ready...</p>
            </div>
        </div>
    </div>

    <script>
        class SpectatorClient {
            constructor() {
                this.setupSocket();
            }

            setupSocket() {
                this.socket = io();
                
                this.socket.on('connect', () => {
                    console.log('Connected to server');
                });

                this.socket.on('gameState', (state) => {
                    this.handleGameState(state);
                });

                this.socket.on('playerPoseUpdate', (data) => {
                    this.handlePlayerPoseUpdate(data);
                });

                this.socket.on('disconnect', () => {
                    console.log('Disconnected from server');
                });
            }

            handleGameState(state) {
                document.getElementById('gameModeText').textContent = state.gameMode.toUpperCase();

                if (state.currentTask) {
                    document.getElementById('currentTaskName').textContent = state.currentTask.name;
                    document.getElementById('currentTaskDesc').textContent = state.currentTask.description;
                } else {
                    document.getElementById('currentTaskName').textContent = 'Waiting for game...';
                    document.getElementById('currentTaskDesc').textContent = '';
                }

                const minutes = Math.floor(state.timer / 60);
                const seconds = state.timer % 60;
                document.getElementById('gameTimer').textContent = 
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;

                this.updatePlayerUI(1, state.player1);
                this.updatePlayerUI(2, state.player2);

                if (state.roundComplete && state.winner) {
                    const announcement = document.getElementById('winnerAnnouncement');
                    const winnerText = document.getElementById('winnerText');
                    
                    if (state.winner === 'tie') {
                        winnerText.textContent = "Final Result: It's a Tie!";
                    } else if (state.winner === 'player1') {
                        winnerText.textContent = '🎉 Player 1 Wins the Game! 🎉';
                    } else {
                        winnerText.textContent = '🎉 Player 2 Wins the Game! 🎉';
                    }
                    
                    announcement.style.display = 'block';
                    document.getElementById('gameStatusText').textContent = 'Game Over! Resetting soon...';
                } else if (state.countdown > 0) {
                    document.getElementById('winnerAnnouncement').style.display = 'none';
                    document.getElementById('currentTaskName').textContent = 'READY?';
                    document.getElementById('currentTaskDesc').textContent = `Starting in ${state.countdown}...`;
                    document.getElementById('gameStatusText').textContent = 'Get ready to pose!';
                } else if (state.gameActive) {
                    document.getElementById('winnerAnnouncement').style.display = 'none';
                    
                    if (state.roundWinner) {
                        const winner = state.roundWinner === 'player1' ? 'Player 1' : 'Player 2';
                        document.getElementById('gameStatusText').textContent = `✨ ${winner} scored a point! ✨`;
                    } else {
                        document.getElementById('gameStatusText').textContent = 'Match the pose as fast as you can!';
                    }
                } else if (state.player1.ready && state.player2.ready) {
                    document.getElementById('winnerAnnouncement').style.display = 'none';
                    document.getElementById('gameStatusText').textContent = 'Both players ready! Countdown starting...';
                } else {
                    document.getElementById('winnerAnnouncement').style.display = 'none';
                    document.getElementById('gameStatusText').textContent = 'Waiting for players to be ready...';
                }
            }

            handlePlayerPoseUpdate(data) {
                const playerNum = data.playerNum;
                document.getElementById(`player${playerNum}Prediction`).textContent = 
                    data.prediction || '-';
                document.getElementById(`player${playerNum}Confidence`).textContent = 
                    data.confidence ? (data.confidence * 100).toFixed(0) + '%' : '-';
                
                if (data.cameraFrame) {
                    this.updatePlayerCamera(playerNum, data.cameraFrame);
                }

                if (data.score !== undefined) {
                    document.getElementById(`player${playerNum}Score`).textContent = data.score;
                }
            }

            updatePlayerUI(num, playerState) {
                document.getElementById(`player${num}Score`).textContent = playerState.score;
                document.getElementById(`player${num}Prediction`).textContent = 
                    playerState.prediction || '-';
                document.getElementById(`player${num}Confidence`).textContent = 
                    playerState.poseConfidence ? (playerState.poseConfidence * 100).toFixed(0) + '%' : '-';
                document.getElementById(`player${num}Ready`).textContent = 
                    playerState.ready ? '✓ Ready' : 'Not Ready';
                document.getElementById(`player${num}Ready`).classList.toggle('ready', playerState.ready);

                if (playerState.cameraFrame) {
                    this.updatePlayerCamera(num, playerState.cameraFrame);
                }
            }

            updatePlayerCamera(num, frameData) {
                const img = document.getElementById(`player${num}Camera`);
                if (typeof frameData !== 'string') {
                    const blob = new Blob([frameData], { type: 'image/jpeg' });
                    const url = URL.createObjectURL(blob);
                    if (img.src && img.src.startsWith('blob:')) {
                        URL.revokeObjectURL(img.src);
                    }
                    img.src = url;
                } else {
                    const prefix = frameData.startsWith('data:image') ? '' : 'data:image/jpeg;base64,';
                    img.src = prefix + frameData;
                }
            }
        }

        // Initialize spectator
        const spectator = new SpectatorClient();
    </script>
</body>
</html>
