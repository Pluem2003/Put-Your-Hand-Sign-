<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Console - Hand Pose Game</title>
    <link rel="stylesheet" href="styles.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="page debug-page">
        <div class="header-bar">
            <a href="/" class="back-button">← Home</a>
            <h1>Debug Console</h1>
        </div>

        <div class="debug-content">
            <div class="debug-section">
                <h2>Game Control</h2>
                <div class="control-box">
                    <button id="startGameBtn" class="btn btn-primary">Start (Countdown)</button>
                    <button id="forceStartBtn" class="btn btn-warning">Force Start (Skip)</button>
                    <button id="forceStopBtn" class="btn btn-danger">Force Stop Game</button>
                    <button id="resetGameBtn" class="btn btn-danger" style="border: 2px solid #000;">Full Reset</button>
                </div>
            </div>

            <div class="debug-section">
                <h2>Game Mode</h2>
                <div class="input-group">
                    <label>Select Mode:</label>
                    <select id="modeSelect">
                        <option value="normal">Normal Mode (All Poses)</option>
                        <option value="rps">Rock Paper Scissor Mode</option>
                    </select>
                    <button id="setModeBtn" class="btn btn-info">Set Mode</button>
                </div>
            </div>

            <div class="debug-section">
                <h2>Timer Control</h2>
                <div class="control-box" style="margin-bottom: 15px;">
                    <button id="pauseTimerBtn" class="btn btn-secondary">Pause Timer</button>
                    <button id="resumeTimerBtn" class="btn btn-success">Resume Timer</button>
                </div>
                <div class="input-group">
                    <label>Set Duration (sec):</label>
                    <input type="number" id="timerInput" min="5" max="300" value="30">
                    <button id="setTimerBtn" class="btn">Set</button>
                </div>
            </div>

            <div class="debug-section">
                <h2>Performance Monitoring</h2>
                <div class="state-display">
                    <div class="state-row">
                        <label>Debug Refresh Rate:</label>
                        <span id="refreshRate">0 Hz</span>
                    </div>
                    <div class="state-row">
                        <label>Player 1 Rate / Inference:</label>
                        <span id="p1Stats">0 msg/s | 0 ms</span>
                    </div>
                    <div class="state-row">
                        <label>Player 2 Rate / Inference:</label>
                        <span id="p2Stats">0 msg/s | 0 ms</span>
                    </div>
                </div>
            </div>

            <div class="debug-section">
                <h2>Player Ready Status (Force)</h2>
                <div class="player-control">
                    <div class="player-control-box player1-control">
                        <h3>Player 1</h3>
                        <div id="player1ReadyStatus" class="status-badge">Not Ready</div>
                        <div class="button-group">
                            <button id="player1ReadyBtn" class="btn btn-success">Force Ready</button>
                            <button id="player1UnreadyBtn" class="btn btn-danger">Force Unready</button>
                        </div>
                    </div>

                    <div class="player-control-box player2-control">
                        <h3>Player 2</h3>
                        <div id="player2ReadyStatus" class="status-badge">Not Ready</div>
                        <div class="button-group">
                            <button id="player2ReadyBtn" class="btn btn-success">Force Ready</button>
                            <button id="player2UnreadyBtn" class="btn btn-danger">Force Unready</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="debug-section">
                <h2>Game State Monitoring</h2>
                <div class="state-display">
                    <div class="state-row">
                        <label>Current Mode:</label>
                        <span id="currentModeDisplay" style="font-weight: bold; color: #764ba2;">-</span>
                    </div>
                    <div class="state-row">
                        <label>Game Active / Timer Running:</label>
                        <span id="gameStatusDisplay">-</span>
                    </div>
                    <div class="state-row">
                        <label>Countdown:</label>
                        <span id="countdownValue">-</span>
                    </div>
                    <div class="state-row">
                        <label>Current Task:</label>
                        <span id="currentTask">-</span>
                    </div>
                    <div class="state-row">
                        <label>Round Winner / Timer:</label>
                        <span id="roundStatsDisplay">-</span>
                    </div>
                    <div class="state-row">
                        <label>Winner:</label>
                        <span id="winner">-</span>
                    </div>
                </div>
            </div>

            <div class="debug-section">
                <h2>Pose Simulator</h2>
                <div class="simulator">
                    <div class="input-group">
                        <select id="poseSelect">
                            <option value="">Select a pose...</option>
                            <option value="Bird">Bird</option>
                            <option value="Bull">Bull</option>
                            <option value="Crab">Crab</option>
                            <option value="Deer">Deer</option>
                            <option value="Dog">Dog</option>
                            <option value="Duck">Duck</option>
                            <option value="Elephant">Elephant</option>
                            <option value="Paper">Paper</option>
                            <option value="Rock">Rock</option>
                            <option value="Scissor">Scissor</option>
                        </select>
                    </div>
                    <div class="button-group">
                        <button id="simulatePlayer1Btn" class="btn btn-info">Send to P1</button>
                        <button id="simulatePlayer2Btn" class="btn btn-info">Send to P2</button>
                    </div>
                </div>
            </div>

            <div id="debugLog" class="debug-log">
                <h3>Activity Log</h3>
                <div id="logContent"></div>
            </div>
        </div>
    </div>

    <script>
        class DebugConsole {
            constructor() {
                this.logMessages = [];
                this.updateCount = 0;
                this.setupSocket();
                this.setupEventListeners();
                this.startRateCalculator();
            }

            setupSocket() {
                this.socket = io();
                
                this.socket.on('connect', () => {
                    this.addLog('Connected to server');
                });

                this.socket.on('gameState', (state) => {
                    this.handleGameState(state);
                });

                this.socket.on('disconnect', () => {
                    this.addLog('Disconnected from server');
                });
            }

            setupEventListeners() {
                document.getElementById('startGameBtn').addEventListener('click', () => this.callApi('/api/debug/game/start', 'POST', 'Start (Countdown)'));
                document.getElementById('forceStartBtn').addEventListener('click', () => this.callApi('/api/debug/game/force-start', 'POST', 'Force Start (Skip)'));
                document.getElementById('forceStopBtn').addEventListener('click', () => this.callApi('/api/debug/game/force-stop', 'POST', 'Force Stop'));
                document.getElementById('resetGameBtn').addEventListener('click', () => this.callApi('/api/debug/game/reset', 'POST', 'Full Reset'));
                
                document.getElementById('pauseTimerBtn').addEventListener('click', () => this.callApi('/api/debug/timer/stop', 'POST', 'Timer Paused'));
                document.getElementById('resumeTimerBtn').addEventListener('click', () => this.callApi('/api/debug/timer/start', 'POST', 'Timer Resumed'));
                
                document.getElementById('setModeBtn').addEventListener('click', () => {
                    const mode = document.getElementById('modeSelect').value;
                    this.callApi('/api/debug/mode/set', 'POST', `Mode: ${mode}`, { mode });
                });

                document.getElementById('setTimerBtn').addEventListener('click', () => {
                    const seconds = document.getElementById('timerInput').value;
                    this.callApi('/api/debug/timer/set', 'POST', `Timer: ${seconds}s`, { seconds });
                });

                document.getElementById('player1ReadyBtn').addEventListener('click', () => this.setReady('1', true));
                document.getElementById('player1UnreadyBtn').addEventListener('click', () => this.setReady('1', false));
                document.getElementById('player2ReadyBtn').addEventListener('click', () => this.setReady('2', true));
                document.getElementById('player2UnreadyBtn').addEventListener('click', () => this.setReady('2', false));

                document.getElementById('simulatePlayer1Btn').addEventListener('click', () => this.simulate('1'));
                document.getElementById('simulatePlayer2Btn').addEventListener('click', () => this.simulate('2'));
            }

            async callApi(url, method, actionName, body = null) {
                try {
                    const options = { method };
                    if (body) {
                        options.headers = { 'Content-Type': 'application/json' };
                        options.body = JSON.stringify(body);
                    }
                    const response = await fetch(url, options);
                    const result = await response.json();
                    if (result.success) this.addLog(`✓ ${actionName} successful`);
                    else this.addLog(`✗ ${actionName} failed: ${result.error || 'Unknown error'}`);
                } catch (e) { this.addLog(`✗ Error ${actionName}: ${e.message}`); }
            }

            async setReady(num, state) {
                this.socket.emit('player_ready', { playerId: `player${num}`, ready: state });
                this.addLog(`P${num} Ready set to: ${state}`);
            }

            async simulate(num) {
                const pose = document.getElementById('poseSelect').value;
                if (!pose) return this.addLog('✗ Select a pose');
                this.socket.emit('player_pose', { playerId: `player${num}`, prediction: pose, confidence: 0.95 });
                this.addLog(`Sim P${num}: ${pose}`);
            }

            startRateCalculator() {
                setInterval(() => {
                    document.getElementById('refreshRate').textContent = this.updateCount + ' Hz';
                    this.updateCount = 0;
                }, 1000);
            }

            handleGameState(state) {
                this.updateCount++;
                
                document.getElementById('currentModeDisplay').textContent = state.gameMode.toUpperCase();
                document.getElementById('gameStatusDisplay').textContent = `${state.gameActive ? 'ACTIVE' : 'INACTIVE'} / ${state.timerRunning ? 'RUNNING' : 'STOPPED'}`;
                document.getElementById('countdownValue').textContent = state.countdown > 0 ? state.countdown : 'None';
                document.getElementById('currentTask').textContent = state.currentTask ? state.currentTask.name : 'None';
                document.getElementById('roundStatsDisplay').textContent = `Round Win: ${state.roundWinner || 'None'} | Timer: ${state.timer}s`;
                document.getElementById('winner').textContent = state.winner || 'None';
                
                document.getElementById('p1Stats').textContent = `${state.msgRates.player1} msg/s | ${state.player1.inferenceTime.toFixed(1)} ms`;
                document.getElementById('p2Stats').textContent = `${state.msgRates.player2} msg/s | ${state.player2.inferenceTime.toFixed(1)} ms`;

                this.updateBadge('player1ReadyStatus', state.player1.ready);
                this.updateBadge('player2ReadyStatus', state.player2.ready);
            }

            updateBadge(id, ready) {
                const el = document.getElementById(id);
                el.textContent = ready ? '✓ READY' : '✗ NOT READY';
                el.className = 'status-badge ' + (ready ? 'ready' : '');
                el.style.background = ready ? '#10b981' : '#ef4444';
                el.style.color = 'white';
            }

            addLog(message) {
                const timestamp = new Date().toLocaleTimeString();
                this.logMessages.unshift(`[${timestamp}] ${message}`);
                if (this.logMessages.length > 15) this.logMessages.pop();
                document.getElementById('logContent').innerHTML = this.logMessages.map(msg => `<div class="log-entry">${msg}</div>`).join('');
            }
        }
        new DebugConsole();
    </script>
</body>
</html>
